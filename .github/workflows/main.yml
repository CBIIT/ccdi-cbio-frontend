# This is a basic workflow to help you get started with Actions
name: CCDI cBioPortal iFrame GitHub Pages deployment

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "gh-pages" branch
  push:
    branches: [ "gh-pages" ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Set Env
      - name: Set env
        run: echo "BRANCH_ENV=master" >> $GITHUB_ENV

      # Run Env
      - name: Run env
        run: echo $BRANCH_ENV

      # node
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '15.2.1'
          cache: 'yarn'
      - run: yarn set version 1.22.5
      - run: yarn install --frozen-lockfile
      - run: yarn run build
      - run: yarn run test

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{steps.deployment.outputs.page_url}}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4